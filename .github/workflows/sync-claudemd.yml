name: Keep CLAUDE.md in sync with PR

# main 대상 PR 이 열리거나 새 커밋이 푸시될 때 동작.
# ① 기계적 구간: 스크립트가 재생성 (AI 불필요)
# ② 판단 구간: Claude 가 diff 보고 서술형 내용만 갱신
# 결과를 같은 PR 브랜치에 커밋한다.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  sync-claudemd:
    # fork 에서 온 PR 제외 (head 브랜치 push 불가)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: PR 브랜치 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: 봇 자동 커밋이면 스킵 (무한루프 차단)
        id: guard
        run: |
          if git log -1 --pretty=%s | grep -q '\[claude-docs\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: CLAUDE.md 존재 확인 (없으면 스킵)
        id: exists
        if: steps.guard.outputs.skip != 'true'
        run: |
          [ -f CLAUDE.md ] && echo "ok=true" >> "$GITHUB_OUTPUT" || echo "CLAUDE.md 없음 → 종료"

      - name: base(main) 최신 ref 가져오기
        if: steps.guard.outputs.skip != 'true' && steps.exists.outputs.ok == 'true'
        run: git fetch origin main

      # ── ① 기계적 구간: 결정론적 스크립트 (AI 불필요) ──
      - name: 기계적 구간 자동 재생성
        if: steps.guard.outputs.skip != 'true' && steps.exists.outputs.ok == 'true'
        run: bash .github/scripts/gen-claudemd-auto.sh

      # ── ② 판단 구간: Claude 가 서술형 내용만 갱신 ──
      - name: Claude Code 설치
        if: steps.guard.outputs.skip != 'true' && steps.exists.outputs.ok == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: 판단 구간 갱신 (Claude)
        if: steps.guard.outputs.skip != 'true' && steps.exists.outputs.ok == 'true'
        env:
          # Pro/Max 구독 토큰으로 인증 (claude setup-token 으로 발급).
          # API 크레딧 대신 구독 한도를 사용한다.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "이 브랜치가 origin/main 대비 바꾼 내용을 'git diff origin/main...HEAD' 로 확인하라.
          CLAUDE.md 에서 '<!-- AUTO-GENERATED:start -->' ~ '<!-- AUTO-GENERATED:end -->' 구간은
          스크립트가 관리하므로 절대 건드리지 마라.
          그 구간 밖의 서술형 내용(아키텍처 개요, 설계 의도, 코딩 규칙/관례, 주의사항)만,
          이번 변경이 그것들을 실제로 바꿨을 때 갱신하라. 해당 없으면 수정하지 마라.
          CLAUDE.md 외의 어떤 파일도 수정하지 마라." \
            --allowedTools "Read,Edit,Bash(git diff:*),Bash(git log:*)"

      # ── ①+② 결과를 같은 PR 브랜치에 커밋 ──
      - name: 변경됐으면 커밋
        if: steps.guard.outputs.skip != 'true' && steps.exists.outputs.ok == 'true'
        run: |
          git diff --quiet -- CLAUDE.md && { echo "변경 없음"; exit 0; }
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git commit -m "docs: PR 변경 반영해 CLAUDE.md 갱신 [claude-docs]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
