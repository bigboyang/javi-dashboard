version: '3.8'

services:
  # ClickHouse вҖ” javi-collectorмҷҖ кіөмң н•ҳкұ°лӮҳ лі„лҸ„ мқёмҠӨн„ҙмҠӨлЎң мӢӨн–ү
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "9000:9000"   # Native protocol
      - "8123:8123"   # HTTP interface
    volumes:
      - ch_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: apm
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # javi-dashboard API м„ңлІ„
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      CH_ADDR: clickhouse:9000
      CH_DATABASE: apm
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ch_data:
